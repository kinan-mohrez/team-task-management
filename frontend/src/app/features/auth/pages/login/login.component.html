<form (ngSubmit)="login()">
  <input
    type="text"
    name="username"
    placeholder="Username"
    [(ngModel)]="loginRequest.username"
    required
  />

  <input
    type="password"
    name="password"
    placeholder="Password"
    [(ngModel)]="loginRequest.password"
    required
  />

  <button type="submit">Login</button>
</form>
