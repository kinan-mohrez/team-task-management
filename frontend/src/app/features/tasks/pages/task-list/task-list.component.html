<mat-card>
  <mat-card-header>
    <mat-card-title>Tasks</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="task-list-actions">
      <button
        mat-raised-button
        color="primary"
        type="button"
        (click)="addTask()"
      >
        <mat-icon>add</mat-icon>
        Add Task
      </button>
    </div>

    <table mat-table [dataSource]="tasks" class="mat-elevation-z2">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let task">
          {{ task.title }}
        </td>
      </ng-container>

      <ng-container matColumnDef="project">
        <th mat-header-cell *matHeaderCellDef>Project</th>
        <td mat-cell *matCellDef="let task">
          {{ getProjectName(task.projectId) }}
        </td>
      </ng-container>

      <ng-container matColumnDef="assignedUser">
        <th mat-header-cell *matHeaderCellDef>Assigned User</th>
        <td mat-cell *matCellDef="let task">
          {{ getAssignedUserName(task.assignedUserId) }}
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let task">
          {{ task.status }}
        </td>
      </ng-container>

      <ng-container matColumnDef="priority">
        <th mat-header-cell *matHeaderCellDef>Priority</th>
        <td mat-cell *matCellDef="let task">
          {{ task.priority }}
        </td>
      </ng-container>

      <ng-container matColumnDef="dueDate">
        <th mat-header-cell *matHeaderCellDef>Due Date</th>
        <td mat-cell *matCellDef="let task">
          {{ task.dueDate | date: "mediumDate" }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let task">
          <button
            mat-icon-button
            color="primary"
            type="button"
            aria-label="Edit task"
            (click)="editTask(task)"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            type="button"
            aria-label="Delete task"
            (click)="deleteTask(task)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <p *ngIf="tasks.length === 0">No tasks available.</p>
  </mat-card-content>
</mat-card>
